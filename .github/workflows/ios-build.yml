name: iOS Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync web assets and Capacitor iOS
        run: npm run ios:sync

      - name: Install CocoaPods dependencies
        working-directory: ios/App
        run: pod install

      - name: Build for iOS Simulator
        working-directory: ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build
        env:
          NSUnbufferedIO: "YES"

      - name: Locate Simulator app bundle
        id: app_path
        working-directory: ios/App
        run: |
          APP_PATH=$(find build -name 'App.app' -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "App.app not found"
            exit 1
          fi
          echo "path=$APP_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload Simulator app
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: ${{ steps.app_path.outputs.path }}
          if-no-files-found: error
